<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý thư viện</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a69bd;
            --primary-color-dark: #3c56a0;
            --background-color: #f4f7fc;
            --surface-color: #ffffff;
            --text-color: #333333;
            --text-color-secondary: #777777;
            --border-color: #e0e0e0;
            --error-color: #e74c3c;
            --error-background: #fdeded;
            --success-color: #2ecc71;
            --font-family: 'Be Vietnam Pro', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 900px;
        }

        .login-container {
            background: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-color-secondary);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-family);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 105, 189, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-btn:hover {
            background: var(--primary-color-dark);
        }

        .login-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .error-message {
            background: var(--error-background);
            color: var(--error-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid var(--error-color);
            font-weight: 500;
            text-align: center;
        }

        .demo-credentials {
            background: #e9f0fa;
            border: 1px solid #d0e0f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            font-size: 13px;
            color: #4a69bd;
        }

        .demo-credentials h4 {
            margin-bottom: 10px;
            color: #3c56a0;
            font-weight: 600;
        }

        .demo-credentials p {
            margin: 8px 0;
            line-height: 1.5;
        }

        .loading {
            display: none;
            align-items: center;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-color-secondary);
            font-size: 14px;
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h1>📚 Library System</h1>
                <p>Nền tảng quản lý thư viện thông minh</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" required placeholder="Nhập tên đăng nhập">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" required placeholder="Nhập mật khẩu">
                </div>

                <button type="submit" class="login-btn" id="login-btn">
                    <div class="loading">
                        <span class="spinner"></span>
                        <span>Đang đăng nhập...</span>
                    </div>
                    <span id="btn-text">Đăng nhập</span>
                </button>
            </form>

            <div class="demo-credentials">
                <h4>Tài khoản mẫu:</h4>
                <p><strong>Quản trị:</strong> admin / admin123</p>
                <p><strong>Thủ thư:</strong> librarian / librarian123</p>
                <p><strong>Độc giả:</strong> reader / reader123</p>
            </div>

            <div class="register-link">
                Chưa có tài khoản? <a href="register.html">Đăng ký tại đây</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');
            const loading = loginBtn.querySelector('.loading');
            const btnText = document.getElementById('btn-text');

            // Show loading state
            loading.style.display = 'flex';
            btnText.style.display = 'none';
            loginBtn.disabled = true;

            fetch(`${API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                btnText.style.display = 'inline';
                loginBtn.disabled = false;

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    const user = data.data;
                    // Use unified UI
                    window.location.href = 'index.html';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.message || 'Đăng nhập thất bại. Vui lòng thử lại.';
                    document.getElementById('password').value = '';
                    // Add shake animation for visual feedback
                    document.querySelector('.login-container').style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        document.querySelector('.login-container').style.animation = '';
                    }, 500);
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                btnText.style.display = 'inline';
                loginBtn.disabled = false;
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Lỗi kết nối: ${error.message}. Vui lòng kiểm tra lại server.`;
            });
        }
        
        // Add a keyframe for the shake animation
        const styleSheet = document.createElement("style");
        styleSheet.type = "text/css";
        styleSheet.innerText = `
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(8px); }
                50% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(styleSheet);


        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                fetch(`${API_BASE_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const user = data.data;
                        // Use unified UI
                        window.location.href = 'index.html';
                    } else {
                        localStorage.removeItem('token');
                    }
                })
                .catch(() => {
                    localStorage.removeItem('token');
                });
            }
        });
    </script>
</body>
</html>
